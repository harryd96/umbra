<div id="automated-blinds-calculator" style="font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 600px; margin: 0 auto;">
  <h2>Automated Blinds Energy Savings Calculator</h2>

  <!-- inputs unchanged ... -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="floorArea" style="flex:0 0 60%;padding-right:10px;">Total Floor Area (m²):</label>
    <input type="number" id="floorArea" required min="1" step="0.1" style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="windowArea" style="flex:0 0 60%;padding-right:10px;">Total Window Area (m²):</label>
    <input type="number" id="windowArea" required min="0" step="0.1" style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="orientation" style="flex:0 0 60%;padding-right:10px;">Predominant Window Orientation:</label>
    <select id="orientation" style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
      <option value="north">North</option>
      <option value="south">South</option>
      <option value="east">East</option>
      <option value="west">West</option>
    </select>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="latitude" style="flex:0 0 60%;padding-right:10px;">Latitude (degrees):</label>
    <input type="number" id="latitude" required step="0.1" min="-90" max="90" style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="blindRValue" style="flex:0 0 60%;padding-right:10px;">Blind R-Value:</label>
    <input type="number" id="blindRValue" step="0.1" min="0" required style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="blindSHGC" style="flex:0 0 60%;padding-right:10px;">Blind Solar Heat Gain Coefficient:</label>
    <input type="number" id="blindSHGC" step="0.01" min="0" max="1" required style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="energyConsumption" style="flex:0 0 60%;padding-right:10px;">Annual Energy Consumption (kWh/m²):</label>
    <input type="number" id="energyConsumption" value="200" min="0" required style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="electricityCost" style="flex:0 0 60%;padding-right:10px;">Electricity Cost (pence per kWh):</label>
    <input type="number" id="electricityCost" step="0.1" value="15" min="0" required style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="usageEffectiveness" style="flex:0 0 60%;padding-right:10px;">Blind Usage Effectiveness:</label>
    <select id="usageEffectiveness" style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
      <option value="0.1">10%</option><option value="0.2">20%</option><option value="0.3">30%</option>
      <option value="0.4">40%</option><option value="0.5">50%</option><option value="0.6">60%</option>
      <option value="0.7" selected>70%</option><option value="0.8">80%</option><option value="0.9">90%</option>
      <option value="1.0">100%</option>
    </select>
  </div>

  <!-- NEW: control strategy -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <label for="controlStrategy" style="flex:0 0 60%;padding-right:10px;">Control Strategy:</label>
    <select id="controlStrategy" style="flex:0 0 35%;padding:5px;width:35%;box-sizing:border-box;">
      <option value="baseline">Baseline (irradiance threshold)</option>
      <option value="kindow" selected>Kindow sun-tracking (reflective fabric)</option>
    </select>
  </div>

  <button onclick="calculateEnergySavings()" style="display:block;width:100%;padding:10px 20px;background-color:black;color:white;border:none;cursor:pointer;margin-top:20px;">Calculate Savings</button>

  <div style="margin-top:20px;">
    <p>Estimated Annual Energy Savings: <span id="energySavings"></span> kWh</p>
    <p>Estimated Annual Cost Savings: <span id="costSavings"></span></p>
    <p id="notes" style="font-size:12px;color:#444;"></p>
  </div>
</div>

<script>
function calculateEnergySavings() {
  const floorArea = parseFloat(document.getElementById('floorArea').value);
  const windowArea = parseFloat(document.getElementById('windowArea').value);
  const orientation = document.getElementById('orientation').value;
  const latitude = parseFloat(document.getElementById('latitude').value);
  const blindRValue = parseFloat(document.getElementById('blindRValue').value);
  const blindSHGC = parseFloat(document.getElementById('blindSHGC').value);
  const energyConsumption = parseFloat(document.getElementById('energyConsumption').value);
  const electricityCost = parseFloat(document.getElementById('electricityCost').value);
  const usageEffectiveness = parseFloat(document.getElementById('usageEffectiveness').value);
  const controlStrategy = document.getElementById('controlStrategy').value;

  // Basic validation
  if (!(floorArea > 0) || windowArea < 0 || !isFinite(latitude) || latitude < -90 || latitude > 90 ||
      blindRValue < 0 || blindSHGC < 0 || blindSHGC > 1 || energyConsumption < 0 || electricityCost < 0) {
    alert('Please check inputs: floor area > 0, window area ≥ 0, -90 ≤ latitude ≤ 90, R ≥ 0, 0 ≤ SHGC ≤ 1, no negatives.');
    return;
  }

  const gbp = new Intl.NumberFormat('en-GB',{ style:'currency', currency:'GBP' });

  // Constants and assumptions
  const SOLAR_HEAT_GAIN_FACTOR = { north:0.4, south:1.2, east:0.8, west:0.8 };
  const WINDOW_IMPACT_FACTOR = 0.4; // share of loads influenced by windows

  // Climate zones (unchanged)
  const CLIMATE_ZONES = [
    { maxLat:23.5, name:'Tropical',  coolingDays:330, heatingDays:0,   avgTemp:28, solarIntensity:1.2 },
    { maxLat:35,   name:'Subtropical',coolingDays:240, heatingDays:60,  avgTemp:22, solarIntensity:1.1 },
    { maxLat:50,   name:'Temperate',  coolingDays:120, heatingDays:180, avgTemp:15, solarIntensity:1.0 },
    { maxLat:66.5, name:'Cold',       coolingDays:60,  heatingDays:270, avgTemp:8,  solarIntensity:0.9 },
    { maxLat:90,   name:'Polar',      coolingDays:0,   heatingDays:365, avgTemp:0,  solarIntensity:0.8 }
  ];
  const climateZone = CLIMATE_ZONES.find(z => Math.abs(latitude) <= z.maxLat) ||
                      { name:'Temperate', coolingDays:120, heatingDays:180, avgTemp:15, solarIntensity:1.0 };

  // Baseline energy (user-provided intensity × area)
  const baselineEnergy = floorArea * energyConsumption; // kWh/yr

  // Derived factors
  const windowFactor = Math.min(windowArea / floorArea, 0.9); // clamp to avoid extremes
  const orientationFactor = SOLAR_HEAT_GAIN_FACTOR[orientation];
  const latitudeFactor = 1 - (Math.abs(latitude) / 90) * 0.5; // 0.5 attenuation at poles
  const blindFactor = (1 - blindSHGC) * (blindRValue / 3);    // stronger with higher R & lower SHGC
  const usageFactor = usageEffectiveness;

  // Exposure index (0..1-ish): how strongly the project will reflect the study’s effects
  let exposureIndex = WINDOW_IMPACT_FACTOR * windowFactor * orientationFactor * latitudeFactor * blindFactor * usageFactor * climateZone.solarIntensity;
  exposureIndex = Math.max(0, Math.min(exposureIndex, 1));

  // Temperature adjustment (same as before)
  const temperatureDelta = Math.abs(climateZone.avgTemp - 22);
  const temperatureAdjustment = 1 + (temperatureDelta / 8);

  let totalEnergySavings = 0;

  if (controlStrategy === 'kindow') {
    // Empirical Kindow calibration from TU/e study:
    // ~44% ↓ lighting, ~25% ↓ heating, ~25% ↑ cooling → ≈ 19–20% net ↓ vs internal reflective baseline.
    // We scale that net reduction by exposureIndex & temperatureAdjustment.
    const KINDOW_NET_REDUCTION = 0.192; // 19.2% ≈ matches reported ~20%
    totalEnergySavings = baselineEnergy * KINDOW_NET_REDUCTION * exposureIndex * temperatureAdjustment;

  } else {
    // Baseline irradiance-threshold control → keep your original physics-y estimate
    const coolingFactor = climateZone.coolingDays / 365;
    const heatingFactor = climateZone.heatingDays / 365;

    const coolingSavings = baselineEnergy * WINDOW_IMPACT_FACTOR * windowFactor *
                           orientationFactor * latitudeFactor * blindFactor * coolingFactor * usageFactor * climateZone.solarIntensity;

    const heatingSavings = baselineEnergy * WINDOW_IMPACT_FACTOR * windowFactor *
                           blindFactor * heatingFactor * usageFactor;

    // Keep modest operational bonuses for automation on baseline
    const automationBonus = 1.1;
    const peakDemandReduction = 1.05;

    totalEnergySavings = (coolingSavings + heatingSavings) * temperatureAdjustment * automationBonus * peakDemandReduction;
  }

  // Cost
  const costSavings = (totalEnergySavings * electricityCost) / 100; // p/kWh → £

  // Output
  document.getElementById('energySavings').textContent = totalEnergySavings.toFixed(2);
  document.getElementById('costSavings').textContent = gbp.format(costSavings);
  document.getElementById('notes').textContent =
    (controlStrategy === 'kindow')
      ? 'Kindow mode uses empirical calibration from TU/e simulations (~20% net energy reduction vs. baseline internal reflective control), scaled by your project’s exposure (window/lat/orientation/fabric/usage).'
      : 'Baseline mode estimates heating/cooling savings from fabric/orientation/latitude and general automation effects.';
}
</script>
