<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Call Tracker + Prospecting</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="antialiased bg-gray-50">
  <div id="app"></div>

<script>
const ALLOWED_USERS = ["harry.doling", "brendan.hill", "raff.nunn"];
const LS_CURRENT_USER = "oct_current_user";
const LS_DATA_PREFIX = "oct_data_";
const LS_PROSPECT_PREFIX = "oct_prospects_";

let currentUser = localStorage.getItem(LS_CURRENT_USER) || "";
let records = currentUser ? loadUserData(currentUser) : [];
let prospects = currentUser ? loadProspects(currentUser) : [];
let showProspecting = false;
let editingRecordId = null;
let editingProspectId = null;
let deckIndex = 0;
let showExtraStats = true;

function uid() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function normalizeNumber(n) {
  return (n || "").replace(/\D+/g, "");
}

function escapeHtml(str) {
  return String(str || "").replace(/[&<>"']/g, m => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[m]));
}

function formatUKTimestamp(date = new Date()) {
  const parts = new Intl.DateTimeFormat("en-GB", {
    timeZone: "Europe/London",
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
  }).formatToParts(date);

  const get = type => parts.find(p => p.type === type)?.value || "";
  return `${get("day")} ${get("month")} ${get("year")}, ${get("hour")}:${get("minute")}${(get("dayPeriod") || "").toLowerCase()}`;
}

function loadUserData(u) {
  try { return JSON.parse(localStorage.getItem(LS_DATA_PREFIX + u) || "[]"); }
  catch { return []; }
}

function saveUserData() {
  if (currentUser) localStorage.setItem(LS_DATA_PREFIX + currentUser, JSON.stringify(records));
}

function loadProspects(u) {
  try { return JSON.parse(localStorage.getItem(LS_PROSPECT_PREFIX + u) || "[]"); }
  catch { return []; }
}

function saveProspects() {
  if (currentUser) localStorage.setItem(LS_PROSPECT_PREFIX + currentUser, JSON.stringify(prospects));
}

function login(username) {
  username = username.trim();
  if (!ALLOWED_USERS.includes(username)) {
    alert("Unknown username");
    return;
  }
  currentUser = username;
  localStorage.setItem(LS_CURRENT_USER, username);
  records = loadUserData(username).map(r => ({
    ...r,
    numberNormalized: r.numberNormalized || normalizeNumber(r.number || ""),
    connected: !!r.connected
  }));
  prospects = loadProspects(username);
  editingRecordId = null;
  editingProspectId = null;
  render();
}

function logout() {
  currentUser = "";
  localStorage.removeItem(LS_CURRENT_USER);
  records = [];
  prospects = [];
  editingRecordId = null;
  editingProspectId = null;
  render();
}

function isSameLondonDay(iso) {
  if (!iso) return false;
  const fmt = d => new Intl.DateTimeFormat("en-GB", {
    timeZone: "Europe/London",
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  }).format(new Date(d));
  return fmt(iso) === fmt(new Date());
}

function mondayKey(dateObj) {
  const parts = new Intl.DateTimeFormat("en-GB", {
    timeZone: "Europe/London",
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  }).formatToParts(dateObj);

  const y = +parts.find(p => p.type === "year").value;
  const m = +parts.find(p => p.type === "month").value;
  const d = +parts.find(p => p.type === "day").value;

  const dt = new Date(Date.UTC(y, m - 1, d));
  const dowMon0 = (dt.getUTCDay() + 6) % 7;
  dt.setUTCDate(dt.getUTCDate() - dowMon0);

  return `${dt.getUTCFullYear()}-${String(dt.getUTCMonth() + 1).padStart(2, "0")}-${String(dt.getUTCDate()).padStart(2, "0")}`;
}

function isSameLondonWeek(iso) {
  return iso && mondayKey(new Date(iso)) === mondayKey(new Date());
}

function statBlock(title, rows) {
  const dials = rows.length;
  const connects = rows.filter(r => r.connected).length;
  const rate = dials ? Math.round((connects / dials) * 100) : 0;

  return `
    <section class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 text-center mt-3">
      <h3 class="text-base font-semibold mb-4">${title}</h3>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
        <div><div class="text-xs uppercase tracking-wide text-gray-500">Dials</div><div class="mt-1 text-5xl font-semibold">${dials}</div></div>
        <div><div class="text-xs uppercase tracking-wide text-gray-500">Connects</div><div class="mt-1 text-5xl font-semibold">${connects}</div></div>
        <div><div class="text-xs uppercase tracking-wide text-gray-500">Connect Rate</div><div class="mt-1 text-5xl font-semibold">${rate}%</div></div>
      </div>
    </section>
  `;
}

function renderTopBar() {
  return `
    <header class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur border-b">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-2">
        ${
          currentUser
            ? `<span class="text-sm text-gray-600">${escapeHtml(currentUser)}</span>
               <button onclick="logout()" class="px-4 py-2 text-sm rounded-xl border border-gray-300 hover:bg-gray-50">Log out</button>`
            : `<input id="loginName" placeholder="Username" class="border rounded-xl px-3 py-2 text-sm">
               <button onclick="login(document.getElementById('loginName').value)" class="px-4 py-2 text-sm rounded-xl border border-gray-300 shadow-sm hover:bg-gray-50">Log in</button>`
        }
        <button onclick="showProspecting=!showProspecting; render();" class="ml-auto px-4 py-2 text-sm rounded-xl border border-gray-300 shadow-sm hover:bg-gray-50">
          ${showProspecting ? "Calling Mode" : "Prospecting Mode"}
        </button>
      </div>
    </header>
  `;
}

function renderInputPanel() {
  const editingRecord = records.find(r => r.id === editingRecordId);
  const editingProspect = prospects.find(p => p.id === editingProspectId);
  const item = editingRecord || editingProspect || {};

  return `
    <div class="flex flex-col gap-3">
      <input id="nameInput" value="${escapeHtml(item.name)}" placeholder="Name" class="w-full border rounded-xl px-3 py-2">
      <input id="numberInput" value="${escapeHtml(item.number)}" placeholder="Number" class="w-full border rounded-xl px-3 py-2">
      <textarea id="notesInput" placeholder="Notes" class="w-full h-40 border rounded-xl px-3 py-2 resize-none">${escapeHtml(item.notes)}</textarea>
      <div class="flex gap-2">
        <button onclick="submitMainInput()" class="px-4 py-2 rounded-xl bg-black text-white">
          ${editingRecord ? "Save changes" : editingProspect ? "Save prospect" : "Add record"}
        </button>
        ${(editingRecord || editingProspect) ? `<button onclick="editingRecordId=null; editingProspectId=null; render();" class="px-4 py-2 rounded-xl border">Cancel</button>` : ""}
      </div>
      ${!currentUser ? `<p class="text-sm text-red-600">Log in to save entries.</p>` : ""}
    </div>
  `;
}

function submitMainInput() {
  if (!currentUser) return alert("Log in first.");

  const name = document.getElementById("nameInput").value.trim();
  const number = document.getElementById("numberInput").value.trim();
  const notes = document.getElementById("notesInput").value.trim();

  if (!name && !number && !notes) return;

  if (editingRecordId) {
    records = records.map(r => r.id === editingRecordId ? {
      ...r,
      name,
      number,
      notes,
      numberNormalized: normalizeNumber(number),
      updatedAtISO: new Date().toISOString()
    } : r);
    editingRecordId = null;
    saveUserData();
    render();
    return;
  }

  if (editingProspectId) {
    prospects = prospects.map(p => p.id === editingProspectId ? { ...p, name, number, notes } : p);
    editingProspectId = null;
    saveProspects();
    render();
    return;
  }

  records.unshift({
    id: uid(),
    name,
    number,
    numberNormalized: normalizeNumber(number),
    notes,
    timestamp: formatUKTimestamp(new Date()),
    createdAtISO: new Date().toISOString(),
    connected: false
  });

  saveUserData();
  render();
}

function isInProspects(record) {
  const rn = normalizeNumber(record.number || "");
  return rn && prospects.some(p => normalizeNumber(p.number || "") === rn);
}

function renderRecords() {
  const sorted = [...records].sort((a, b) => (a.createdAtISO < b.createdAtISO ? 1 : -1));

  if (!sorted.length) {
    return `<div class="px-3 py-2 text-sm text-gray-500">No records yet.</div>`;
  }

  return sorted.map(r => {
    const inProspect = isInProspects(r);
    const bg = r.connected ? "bg-green-50" : inProspect ? "bg-sky-50" : "";

    return `
      <div class="px-3 py-2 ${bg}">
        <div class="flex items-center justify-between">
          <div class="font-medium truncate">${escapeHtml(r.name || "(No name)")}</div>
          <div class="text-sm text-gray-600 ml-2">${escapeHtml(r.timestamp || "")}</div>
        </div>
        <div class="text-sm text-gray-700 truncate">${escapeHtml(r.number || "(No number)")}</div>
        ${r.notes ? `<div class="text-xs text-gray-500 whitespace-pre-wrap">${escapeHtml(r.notes)}</div>` : ""}
        <div class="mt-2 flex flex-wrap items-center gap-3">
          <button onclick="editingRecordId='${r.id}'; editingProspectId=null; render();" class="text-blue-700 text-sm">Edit</button>
          <button onclick="deleteRecord('${r.id}')" class="text-red-600 text-sm">Delete</button>
          <button onclick="toggleProspect('${r.id}')" class="text-sm ${inProspect ? "text-red-600" : "text-green-700"}">${inProspect ? "Remove" : "Add"} prospect</button>
          <button onclick="toggleConnected('${r.id}')" class="text-sm ${r.connected ? "text-emerald-700" : "text-gray-700"}">${r.connected ? "Connected" : "Mark connected"}</button>
        </div>
      </div>
    `;
  }).join("");
}

function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  if (editingRecordId === id) editingRecordId = null;
  saveUserData();
  render();
}

function toggleConnected(id) {
  records = records.map(r => r.id === id ? { ...r, connected: !r.connected } : r);
  saveUserData();
  render();
}

function toggleProspect(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;

  const rn = normalizeNumber(r.number || "");
  if (!rn) return alert("No number on this record.");

  if (isInProspects(r)) {
    prospects = prospects.filter(p => normalizeNumber(p.number || "") !== rn);
  } else {
    prospects.push({
      id: uid(),
      name: r.name || "",
      number: r.number || "",
      notes: r.notes || "",
      createdAtISO: new Date().toISOString()
    });
  }

  saveProspects();
  render();
}

function renderProspectsDeck() {
  if (!prospects.length) return "";

  const p = prospects[Math.min(deckIndex, prospects.length - 1)];

  return `
    <div class="mt-4 border rounded-2xl p-4">
      <div class="flex items-center justify-between mb-2">
        <h3 class="font-semibold">Prospect</h3>
        <span class="text-xs text-gray-500">${Math.min(deckIndex + 1, prospects.length)} / ${prospects.length}</span>
      </div>
      <div class="text-sm">
        <div><strong>Name:</strong> ${escapeHtml(p.name || "(No name)")}</div>
        <div><strong>Number:</strong> ${escapeHtml(p.number || "(No number)")}</div>
        ${p.notes ? `<div class="mt-1 whitespace-pre-wrap">${escapeHtml(p.notes)}</div>` : ""}
      </div>
      <textarea id="extraNote" placeholder="Additional note" class="mt-3 w-full h-20 border rounded-xl px-3 py-2"></textarea>
      <div class="mt-3 flex gap-2">
        <button onclick="promoteProspect('${p.id}')" class="px-4 py-2 rounded-xl bg-green-600 text-white">✓</button>
        <button onclick="deckIndex=(deckIndex+1)%prospects.length; render();" class="px-4 py-2 rounded-xl bg-gray-300">Skip</button>
        <button onclick="editingProspectId='${p.id}'; editingRecordId=null; render();" class="px-4 py-2 rounded-xl bg-blue-600 text-white">Edit</button>
        <button onclick="removeProspect('${p.id}')" class="px-4 py-2 rounded-xl border">Remove</button>
      </div>
    </div>
  `;
}

function promoteProspect(id) {
  const p = prospects.find(x => x.id === id);
  if (!p) return;

  const extra = document.getElementById("extraNote")?.value.trim() || "";
  const notes = [p.notes, extra].filter(Boolean).join("\n");

  records.unshift({
    id: uid(),
    name: p.name || "",
    number: p.number || "",
    numberNormalized: normalizeNumber(p.number || ""),
    notes,
    timestamp: formatUKTimestamp(new Date()),
    createdAtISO: new Date().toISOString(),
    connected: false
  });

  prospects = prospects.filter(x => x.id !== id);
  deckIndex = 0;

  saveUserData();
  saveProspects();
  render();
}

function removeProspect(id) {
  prospects = prospects.filter(p => p.id !== id);
  deckIndex = 0;
  saveProspects();
  render();
}

function renderProspectingPage() {
  return `
    ${renderTopBar()}
    <div class="min-h-screen bg-gray-50 p-6 pt-24">
      <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow p-6">
        <h2 class="text-lg font-semibold mb-4">Prospecting</h2>
        ${renderInputPanel()}
        <div class="mt-6">
          <div class="text-sm font-medium mb-2">Your prospects</div>
          <div class="rounded-xl border divide-y">
            ${
              prospects.length
              ? prospects.map(p => `
                  <div class="px-3 py-2 text-sm grid grid-cols-12 gap-2 items-start">
                    <div class="col-span-3 truncate font-medium">${escapeHtml(p.name || "(No name)")}</div>
                    <div class="col-span-3 truncate">${escapeHtml(p.number || "(No number)")}</div>
                    <div class="col-span-4 truncate text-gray-600">${escapeHtml(p.notes || "")}</div>
                    <div class="col-span-2 flex gap-2 justify-end">
                      <button onclick="editingProspectId='${p.id}'; render();" class="px-2 py-1 rounded border text-blue-700">Edit</button>
                      <button onclick="removeProspect('${p.id}')" class="px-2 py-1 rounded border text-red-600">Delete</button>
                    </div>
                  </div>
                `).join("")
              : `<div class="px-3 py-2 text-sm text-gray-500">No prospects yet.</div>`
            }
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderCallingPage() {
  const today = records.filter(r => isSameLondonDay(r.createdAtISO));
  const week = records.filter(r => isSameLondonWeek(r.createdAtISO));

  return `
    ${renderTopBar()}
    <div class="relative min-h-screen bg-gray-50">
      <div class="max-w-6xl mx-auto px-4 pt-20 pb-8">
        <main class="grid grid-cols-1 lg:grid-cols-2 gap-6 min-h-0 items-start">
          <section class="bg-white rounded-2xl shadow-sm p-4 min-h-0">
            <div class="border rounded-xl divide-y max-h-[760px] overflow-y-auto">
              ${renderRecords()}
            </div>
          </section>

          <section class="bg-white rounded-2xl shadow-sm p-4 self-start">
            ${renderInputPanel()}
            ${renderProspectsDeck()}

            <div class="mt-6">
              ${statBlock("Today", today)}
              <div class="mt-2 flex items-center justify-end">
                <button onclick="showExtraStats=!showExtraStats; render();" class="text-sm text-gray-700 px-2 py-1">
                  ${showExtraStats ? "Hide extra" : "Show extra"}
                </button>
              </div>
              ${showExtraStats ? statBlock("This Week", week) + statBlock("All Time", records) : ""}
            </div>
          </section>
        </main>
      </div>
    </div>
  `;
}

function render() {
  document.getElementById("app").innerHTML = showProspecting ? renderProspectingPage() : renderCallingPage();

  setTimeout(() => {
    const input = document.getElementById("nameInput") || document.getElementById("loginName");
    if (input) input.focus();
  }, 0);
}

window.addEventListener("keydown", async e => {
  if (e.key === "Enter" && ["nameInput", "numberInput", "notesInput"].includes(document.activeElement?.id)) {
    e.preventDefault();
    submitMainInput();
  }

  if (e.key === "ArrowLeft") document.getElementById("nameInput")?.focus();
  if (e.key === "ArrowDown") document.getElementById("numberInput")?.focus();
  if (e.key === "ArrowRight") document.getElementById("notesInput")?.focus();

  if (e.key === "ArrowUp") {
    try {
      const clip = await navigator.clipboard.readText();
      if (clip && document.getElementById("numberInput")) {
        document.getElementById("numberInput").value = clip;
        document.getElementById("numberInput").focus();
      }
    } catch {}
  }
});

render();
</script>
</body>
</html>
